<svg xmlns="http://www.w3.org/2000/svg" width="560" height="80" viewBox="0 0 560 80" fill="none">
  <defs>
    <linearGradient id="layer-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <g transform="translate(164, 0)">
    <!-- Top layer — smallest, most transparent -->
    <path d="M10 27L16 22L36 22L30 27Z" fill="#58a6ff" opacity="0.25"/>
    <path d="M10 27L16 22L36 22L30 27Z" stroke="#58a6ff" stroke-width="0.5" opacity="0.4"/>

    <!-- Middle layer -->
    <path d="M5 37L11 32L39 32L33 37Z" fill="#58a6ff" opacity="0.5"/>
    <path d="M5 37L11 32L39 32L33 37Z" stroke="#58a6ff" stroke-width="0.5" opacity="0.6"/>

    <!-- Base layer — widest, most opaque, gradient fill -->
    <path d="M0 47L6 42L42 42L36 47Z" fill="url(#layer-grad)"/>
    <path d="M0 47L6 42L42 42L36 47Z" stroke="#58a6ff" stroke-width="0.5" opacity="1"/>

    <!-- Connecting lines -->
    <line x1="10" y1="27" x2="5" y2="37" stroke="#58a6ff" stroke-width="0.5" opacity="0.2"/>
    <line x1="30" y1="27" x2="33" y2="37" stroke="#58a6ff" stroke-width="0.5" opacity="0.2"/>
    <line x1="5" y1="37" x2="0" y2="47" stroke="#58a6ff" stroke-width="0.5" opacity="0.2"/>
    <line x1="33" y1="37" x2="36" y2="47" stroke="#58a6ff" stroke-width="0.5" opacity="0.2"/>

    <!-- Subtle glow on base -->
    <path d="M0 47L6 42L42 42L36 47Z" fill="#58a6ff" opacity="0.08"/>

    <!-- Text -->
    <text x="52" y="43" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="28" font-weight="600" fill="#e6edf3" letter-spacing="-0.5">Base Layer</text>
  </g>
</svg>
